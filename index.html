<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="icon" type="image/png" href="https://i.ibb.co.com/1t0b51qg/1000113996.png">

    <title>SEPTOPIA GTPS | Official Portal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap');
        
        :root { 
            --accent: #3b82f6; 
            --bg-dark: #0a0f1d; 
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            /* BANNER BACKGROUND DARI IMGUR BARU */
            background-image: linear-gradient(to bottom, rgba(10, 15, 29, 0.6), #0a0f1d), 
                              url('https://i.imgur.com/k6lP0Wn.png');
            background-size: 100% 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .page-content {
            display: none; height: calc(100vh - 80px);
            overflow-y: auto; padding: 2.5rem; animation: fadeIn 0.4s ease;
        }

        .active-page { display: flex; flex-direction: column; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .nav-link {
            font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em;
            color: #94a3b8; transition: all 0.3s; cursor: pointer;
        }
        .nav-link:hover, .nav-link.active { color: white; border-bottom: 2px solid var(--accent); }

        .glass-card { 
            background: rgba(22, 29, 47, 0.7); 
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 bg-[#0a0f1d]/80 backdrop-blur-md border-b border-white/5 h-20">
        <div class="max-w-6xl mx-auto px-6 h-full flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="showPage('home')">
                <img src="https://i.ibb.co.com/1t0b51qg/1000113996.png" class="w-10 h-10 rounded-lg border-2 border-yellow-500 shadow-lg" alt="Logo">
                <span class="font-black text-xl uppercase text-white tracking-tighter italic">Septopia <span class="text-blue-500">PS</span></span>
            </div>
            
            <div class="hidden lg:flex gap-8 items-center h-full">
                <div onclick="showPage('home')" id="n-home" class="nav-link active py-7">Home</div>
                <div onclick="showPage('stats')" id="n-stats" class="nav-link py-7">Statistic</div>
                <div onclick="showPage('connect')" id="n-connect" class="nav-link py-7">Connect</div>
                <div onclick="showPage('shop')" id="n-shop" class="px-5 py-2 bg-blue-600 rounded-lg font-black text-[10px] uppercase text-white cursor-pointer hover:bg-blue-500">Shop</div>
            </div>
        </div>
    </nav>

    <main class="mt-20">
        
        <div id="p-home" class="page-content active-page items-center justify-center text-center">
            <img src="https://i.ibb.co.com/1t0b51qg/1000113996.png" class="w-32 h-32 rounded-3xl border-4 border-yellow-500/30 mb-8 shadow-2xl">
            <h1 class="text-6xl md:text-8xl font-black italic uppercase text-white leading-none tracking-tighter">Septopia <br><span class="text-blue-600">PS</span></h1>
            <p class="mt-6 text-slate-200 max-w-xl text-lg font-semibold italic drop-shadow-lg">"The Best Private Server Experience with Custom Items & Active Community."</p>
        </div>

        <div id="p-stats" class="page-content">
            <div class="max-w-4xl mx-auto py-12">
                <h2 class="text-white font-black text-3xl italic uppercase mb-8 text-center">Live Stats</h2>
                <div class="grid grid-cols-2 gap-6">
                    <div class="glass-card p-10 rounded-[2.5rem] text-center">
                        <p class="text-[10px] font-bold text-slate-500 uppercase mb-2">Online Players</p>
                        <h3 class="text-6xl font-black text-white" id="p-online">0</h3>
                    </div>
                    <div class="glass-card p-10 rounded-[2.5rem] text-center">
                        <p class="text-[10px] font-bold text-slate-500 uppercase mb-2">Status</p>
                        <h3 class="text-3xl font-black text-green-400 uppercase italic">Online</h3>
                    </div>
                </div>
            </div>
        </div>

        <div id="p-connect" class="page-content">
            <div class="max-w-4xl mx-auto py-12">
                <div class="grid gap-4">
                    <div class="glass-card p-8 rounded-3xl flex justify-between items-center">
                        <h4 class="text-white font-black italic uppercase">Android APK</h4>
                        <a href="https://www.mediafire.com/file/jjnsgutlodhz1zs/SeptopiaPS.apk/file" target="_blank" class="bg-green-600 px-8 py-3 rounded-xl font-black text-[10px] text-white uppercase">Download</a>
                    </div>
                    <div class="glass-card p-8 rounded-3xl flex justify-between items-center font-mono">
                        <h4 class="text-white font-black italic uppercase font-sans">PC IP</h4>
                        <div class="text-blue-400">91.134.85.13</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="p-shop" class="page-content">
            <div class="max-w-4xl mx-auto py-12 text-center">
                <div class="glass-card p-16 rounded-[3rem] border-2 border-yellow-500/50">
                    <h2 class="text-4xl font-black text-white italic mb-4 uppercase">Septopia Store</h2>
                    <p class="text-slate-300 mb-10">Beli Diamond Locks & Premium Rank via WhatsApp Admin.</p>
                    <button onclick="window.open('https://wa.me/6281525742110')" class="bg-yellow-500 px-12 py-5 rounded-2xl font-black text-black uppercase tracking-widest shadow-xl">WhatsApp Admin</button>
                </div>
            </div>
        </div>

    </main>

    <script>
        function showPage(pageId) {
            const pages = document.querySelectorAll('.page-content');
            pages.forEach(p => p.classList.remove('active-page'));
            const links = document.querySelectorAll('.nav-link');
            links.forEach(l => l.classList.remove('active'));
            document.getElementById('p-' + pageId).classList.add('active-page');
            if(document.getElementById('n-' + pageId)) document.getElementById('n-' + pageId).classList.add('active');
        }

        async function update() {
            const API = "https://api.gtps.cloud/api/server/public/5678";
            const PROXY = `https://api.allorigins.win/get?url=${encodeURIComponent(API)}&t=${Date.now()}`;
            try {
                const res = await fetch(PROXY).then(r => r.json());
                const d = JSON.parse(res.contents).state;
                document.getElementById('p-online').innerText = d.players_online || 0;
            } catch (e) { }
        }
        update(); setInterval(update, 30000);
    </script>
</body>
</html>
